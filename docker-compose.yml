services:
  chatty0:
    image: ancientlore/chatty:latest
    container_name: chatty0
    command: ["-system", "/etc/chatty/system.txt", "-search-system", "/etc/chatty/search_system.txt", "-prefix", "✨️ "]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MESHMONITOR_API_URL=${MESHMONITOR_API_URL}
      - MESHMONITOR_API_TOKEN=${MESHMONITOR_API_TOKEN}
      - MESHMONITOR_SOURCE=${MESHMONITOR_SOURCE}
      - MESHMONITOR_API_TIMEOUT=${MESHMONITOR_API_TIMEOUT}
    ports:
      - "8080:8080"
    volumes:
      - chatty-config:/etc/chatty:ro
    restart: unless-stopped
volumes:
  chatty-config:
    driver: local
    driver_opts:
      type: none
      device: ${CHATTY_CONFIG_DIR}
      o: bind
